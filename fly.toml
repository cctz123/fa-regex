# fly.toml app configuration file generated by Cursor
#
# For docs, see https://fly.io/docs/reference/configuration/
#

app = "favisualizer"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  # Persist diagrams on the mounted volume.
  DIAGRAMS_DIR = "/data/diagrams"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "diagrams"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

